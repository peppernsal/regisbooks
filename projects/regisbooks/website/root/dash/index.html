<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Profile</title>
		
		<link rel="icon" type="image/png" href="/static/images/favicon.png">

		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
		<script 
			src="https://www.unpkg.com/@propelauth/javascript@2.0.11/dist/javascript.min.js" 
			integrity="sha384-FENNH2f7QuQvkZJBL7jebLr0OtYKgTA2iq+C5g3VXXX7SBwWmeMMoc+pBBtcn76G" 
			crossorigin="anonymous"></script>
		<script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.5/dist/js.cookie.min.js"></script>

		
		<script src="/static/js/auth.js"></script>
		<script src="/static/js/apihelpers.js"></script>
		<script src="/static/js/element.js"></script>
		<script src="/static/js/dashboard.js" defer></script>
		<script src="/static/js/sidebar.js"></script>

		<link rel="stylesheet" href="/static/css/theme.css">
		<link rel="stylesheet" href="/static/css/dashboard.css">
	</head>
	<body class="bg-light text-dark">
		<div class="sidebar bg-primary text-white py-4">
			<button class="sidebar-toggle btn btn-primary" onclick="toggleSidebar()" aria-label="Toggle sidebar">
				&#9776;
			</button>
			<nav class="d-flex flex-column align-items-center">
				<a href="/view-listings" class="text-white mb-3">View Listings</a>
				<a href="/enter-isbn" class="text-white mb-3">Add Listing</a>
				<a href="/dash" class="text-white mb-3">Profile</a>
				<a href="/help#dash" class="text-white mb-3">Help</a>
				<a href="/leaderboard" class="text-white mb-3">Leaderboard</a>
				<a href="/about" class="text-white mb-3">About</a>
				<a href="https://forms.gle/BGWu2xEUFAbYyPHHA" class="text-white mb-3">Feedback</a>
				<a href="/logout" class="text-white">Logout</a>
			</nav>
		</div>

		<div class="content py-5">
			<div class="bg-light text-success p-4 rounded border border-success mx-4">
				<h1 class="text-center mb-3">
					<i class="bi bi-person-circle me-2"></i>Dashboard
				</h1>

				<div class="mb-4">
					<div class="row align-items-center">
						<div class="col-md-8">
							<h4><i class="bi bi-person-fill me-2"></i>Name: <span id="full-name"></span></h4>
							<h5><i class="bi bi-at me-2"></i>Username: <span id="username"></span></h5>
							<h5><i class="bi bi-envelope-fill me-2"></i>Email: <span id="email"></span></h5>
						</div>
						<div class="col-md-4">
							<span class="fs-2 fw-bold text-warning">
								<i class="bi bi-star-fill me-2"></i>Aura: <span id="aura"></span>
							</span>
						</div>
					</div>
				</div>

				<h3 class="mt-4"><i class="bi bi-bar-chart-fill me-2"></i>Your Stats</h3>
				<div class="row row-cols-1 row-cols-md-3 g-3 mt-2">
					<div class="col">
						<div class="card text-center border-success">
							<div class="card-body">
								<h5 class="card-title">Listings Made</h5>
								<p class="card-text fs-4" id="stat-listings-made">0</p>
							</div>
						</div>
					</div>
					<div class="col">
						<div class="card text-center border-success">
							<div class="card-body">
								<h5 class="card-title">Books Given</h5>
								<p class="card-text fs-4" id="stat-books-given">0</p>
							</div>
						</div>
					</div>
					<div class="col">
						<div class="card text-center border-success">
							<div class="card-body">
								<h5 class="card-title">Books Received</h5>
								<p class="card-text fs-4" id="stat-books-received">0</p>
							</div>
						</div>
					</div>
				</div>

				<h3 class="mt-5"><i class="bi bi-journal-text me-2"></i>Your Listings</h3>
				<div id="user-listings" class="row row-cols-1 row-cols-md-2 mt-2 g-3">
				</div>

				<div class="d-flex justify-content-end mt-3">
					<a href="/view-listings" class="btn btn-outline-success">
						<i class="bi bi-eye-fill me-1"></i>View All Listings
					</a>
				</div>
			</div>
		</div>
	</body>
</html>
