<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Edit Listing</title>

		<link rel="icon" type="image/png" href="/static/images/favicon.png">

		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

		<script 
			src="https://www.unpkg.com/@propelauth/javascript@2.0.11/dist/javascript.min.js" 
			integrity="sha384-FENNH2f7QuQvkZJBL7jebLr0OtYKgTA2iq+C5g3VXXX7SBwWmeMMoc+pBBtcn76G" 
			crossorigin="anonymous"></script>
		<script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.5/dist/js.cookie.min.js"></script>

		<script src="/static/js/auth.js"></script>
		<script src="/static/js/apihelpers.js"></script>
		<script src="/static/js/element.js"></script>
		<script src="/static/js/edit-listing.js" defer></script>
		<script src="/static/js/sidebar.js"></script>
		<link rel="stylesheet" href="/static/css/theme.css">
		<link rel="stylesheet" href="/static/css/add-listing.css">
	</head>
	
	<body class="bg-light text-dark">
		<div class="sidebar bg-primary text-white py-4">
			<button class="sidebar-toggle btn btn-primary" onclick="toggleSidebar()" aria-label="Toggle sidebar">
				&#9776;
			</button>
			<nav class="d-flex flex-column align-items-center">
				<a href="/view-listings" class="text-white mb-3">View Listings</a>
				<a href="/view-books" class="text-white mb-3">View Books</a>
				<a href="/enter-isbn" class="text-white mb-3">Add Listing</a>
				<a href="/dash" class="text-white mb-3">Profile</a>
				<a href="/help#add-listing" class="text-white mb-3">Help</a>
				<a href="/leaderboard" class="text-white mb-3">Leaderboard</a>
				<a href="/about" class="text-white mb-3">About</a>
				<a href="https://forms.gle/BGWu2xEUFAbYyPHHA" class="text-white mb-3">Feedback</a>
				<a href="/logout" class="text-white">Logout</a>
			</nav>
		</div>

		<div class="content py-5">
			<div class="row justify-content-center">
				<div class="col-md-11">
					<div class="card bg-light text-dark">
						<div class="card-body text-center">
							<h2 id="waiting-message"></h3>
							<figure>
								<img id="book-cover-img"/>
								<figcaption id="cover-disclaimer"></figcaption>
							</figure>
							<h1 id="book-title"></h1>
							<h2 id="book-author"></h2>
							<h3 id="book-isbn"></h3>
							<h3 id="book-publishing-info"></h4>
							
							<div class="container pt-4">
								<div class="row">
									<div class="col-3">
										<h4>Usage Level</h4>
									</div>
									<div class="col-9">
										<select id="usage-level" class="form-control">
											<option value="0">New</option>
											<option value="1">Lightly Used</option>
											<option value="2">Used</option>
										</select>
									</div>
								</div>

								<div class="row pt-3">
									<div class="col-3 align-self-center">
										<h4>Notes</h4>
									</div>
									<div class="col-9 align-self-center">
										<textarea id="notes" class="form-control" rows="2"></textarea>
									</div>
								</div>

								<div class="row">
									<div id="pickup-locations-container" class="container mb-4">

									</div>
								</div>

								<div class="row">
									<button type="button" onclick="addPickupLocation()" class="btn btn-primary">Add A Pickup Location</button>
								</div>
								
								<div class="row pt-3">
									<button type="button" onclick="editListing()" class="btn btn-success">Update</button>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
