<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Add a Listing - Enter ISBN</title>

		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

		<script 
			src="https://www.unpkg.com/@propelauth/javascript@2.0.11/dist/javascript.min.js" 
			integrity="sha384-FENNH2f7QuQvkZJBL7jebLr0OtYKgTA2iq+C5g3VXXX7SBwWmeMMoc+pBBtcn76G" 
			crossorigin="anonymous"></script>

		<script src="/static/js/auth.js"></script>
		<script src="/static/js/apihelpers.js"></script>
		<script src="/static/js/element.js"></script>
		<script src="/static/js/enter-isbn.js" defer></script>
		<link rel="stylesheet" href="/static/css/theme.css">
	</head>
	
	<body class="bg-success text-white">
		<div class="sidebar">
			<a href=/view-listings>View Listings</a>
			<a href=/dash>Dashboard</a>
			<a href=/logout>Logout</a>
		</div>
		<div class="content">
			<div class="container py-5">
				<div class="row justify-content-center">
					<div class="col-md-8">
						<div class="card bg-light text-dark">
							<div class="card-body">
								<h1 id="heading" class="card-title text-center mb-4"></h1>
								
								<form>
									<div class="mb-3">
										<label for="isbn-entry" class="form-label">Book ISBN</label>
										<input type="text" id="isbn-entry" class="form-control" required>
									</div>
									
									<div class="d-grid">
										<button type="button" onclick="propagateISBN()" class="btn btn-success">Next</button>
									</div>
								</form>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
