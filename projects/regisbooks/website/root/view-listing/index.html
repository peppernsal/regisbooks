<!DOCTYPE html>

<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>View Listing</title>

		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

		<script src="https://www.unpkg.com/@propelauth/javascript@2.0.11/dist/javascript.min.js"></script>

		<script src="/static/js/auth.js"></script>
		<script src="/static/js/apihelpers.js"></script>
		<script src="/static/js/element.js"></script>
		<script src="/static/js/view-listing.js" defer></script>
		<script src="/static/js/sidebar.js"></script>

		<link rel="stylesheet" href="/static/css/theme.css">
		<link rel="stylesheet" href="/static/css/add-listing.css">
	</head>
	<body class="bg-light text-dark">
		<div class="sidebar bg-primary text-white py-4">
			<button class="sidebar-toggle btn btn-primary" onclick="toggleSidebar()" aria-label="Toggle sidebar">
				&#9776;
			</button>
			<nav class="d-flex flex-column align-items-center">
				<a href="/view-listings" class="text-white mb-3">View Listings</a>
				<a href="/enter-isbn" class="text-white mb-3">Add Listing</a>
				<a href="/dash" class="text-white mb-3">Profile</a>
				<a href="/help#view-listing" class="text-white mb-3">Help</a>
				<a href="/logout" class="text-white">Logout</a>
			</nav>
		</div>

		<div class="content">
			<div class="container mt-4">
				<div class="row justify-content-center">
					<div class="col-md-10">
						<div class="card bg-light text-dark shadow-lg">
							<div class="card-body">
								<div class="row align-items-center">
									<div class="col-md-4 text-center">
										<figure>
											<img id="book-cover-img" class="img-fluid rounded shadow" style="max-height: 300px;" />
											<figcaption id="cover-disclaimer" class="text-muted small mt-2"></figcaption>
										</figure>
									</div>

									<div class="col-md-8">
										<h1 id="book-title" class="fw-bold"></h1>
										<h2 id="book-author" class="text-muted"></h2>
										<h3 id="book-isbn" class="mt-3"></h3>
										<h3 id="book-publishing-info"></h3>

										<hr>

										<h4 id="listing-author" class="fw-semibold"></h4>
										<h4 id="listing-usage-level"></h4>
										<h4 id="listing-status"></h4>
										<h5 id="listing-notes" class="fst-italic"></h5>
									</div>
								</div>

								<hr>

								<div id="pickup-locations-container" class="container mb-4 p-3 bg-light rounded border"></div>

								<div class="text-center">
									<button id="request-listing" class="btn btn-success btn-lg fw-bold" onclick="requestThisListing()">Request This Book</button>
								</div>
							
								<div id="req-info" class="row align-items-center text-center d-none">
									<div class="col-md-3">
										<h3 id="success-message"></h3>
									</div>
									
									<div class="col-md-2">
										<a id="email-info-btn" class="btn btn-success btn-lg fw-bold">Show Lister Email</a>
									</div>

									<div class="col-md-2">
										<a id="rem-listing-btn" class="btn btn-danger btn-lg fw-bold">Remove My Request</a>
									</div>

									<div class="col-md-5">
										<h3><a id="email-info" class="d-none"></a></h3>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>

		<footer class="text-end mt-4" style="position: fixed; bottom: 0; right: 0; padding: 10px; padding-right: 20px;">
			<p>&copy; 2025 Carl Furtado. All rights reserved.</p>
		</footer>
		</div>
	</body>
</html>
