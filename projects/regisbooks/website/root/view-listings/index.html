<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>View Listings</title>

		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
		<script 
			src="https://www.unpkg.com/@propelauth/javascript@2.0.11/dist/javascript.min.js" 
			integrity="sha384-FENNH2f7QuQvkZJBL7jebLr0OtYKgTA2iq+C5g3VXXX7SBwWmeMMoc+pBBtcn76G" 
			crossorigin="anonymous"></script>
			
		<script src="/static/js/auth.js"></script>
		<script src="/static/js/apihelpers.js"></script>
		<script src="/static/js/element.js"></script>
		<script src="/static/js/view-listings.js" defer></script>
		<link rel="stylesheet" href="/static/css/theme.css">
	</head>

	<body class="bg-success text-light">
		<div class="sidebar">
			<a href=/view-listings>View Listings</a>
			<a href=/dash>Profile</a>
			<a href=/logout>Logout</a>
		</div>
		
		<div class="content">
			<div id="wrapper" class="container mt-5 p-4 bg-light text-success rounded border border-success">
				<h1 id="header" class="text-center text-success"></h1>

				<a id="new-listing" href="/enter-isbn" class="btn btn-success mb-3 d-block text-center">List a New Book</a>

				<div class="mb-4">
					<div class="form-check form-switch mb-3">
						<input class="form-check-input" type="checkbox" id="show-my-listings">
						<label class="form-check-label" for="show-my-listings">Show only my listings</label>
					</div>
					
					<fieldset id="filter-set">
						<div class="row g-2">
							<div class="col-md-6">
								<input type="text" class="form-control" id="filter-name" placeholder="Filter by title">
							</div>

							<div class="col-md-6">
								<input type="text" class="form-control" id="filter-isbn" placeholder="Filter by ISBN">
							</div>
						</div>
						
						<div class="row g-2 mt-2">
							<div class="col-md-4">
								<select class="form-select" id="filter-status">
									<option value="">All Statuses</option>
									<option value="0">Available</option>
									<option value="1">Requested</option>
									<option value="2">Given Away</option>
								</select>
							</div>
						
							<div class="col-md-4">
								<select class="form-select" id="filter-usage">
									<option value="">All Usage</option>
									<option value="0">New</option>
									<option value="1">Lightly Used</option>
									<option value="2">Used</option>
								</select>
							</div>
						
							<div class="col-md-4 d-flex">
								<input type="text" class="form-control me-2" id="location-input" placeholder="Add Location">
								<button class="btn btn-success" id="add-location" onclick="addLocation()">+</button>
							</div>
						</div>
						
						<div class="mt-2" id="location-tags"></div>
					</fieldset>
				</div>
				
				<div id="listings-container" class="mb-4 row">
				</div>
			</div>
		</div>
	</body>
</html>
