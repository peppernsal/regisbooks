<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>View Listings</title>

		<link rel="preload" href="/static/js/view-listings.js" as="script">
		<link rel="preload" href="/static/js/auth.js" as="script">
		<link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" as="style" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
		<link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" as="style">
		<link rel="preload" href="https://www.unpkg.com/@propelauth/javascript@2.0.11/dist/javascript.min.js" as="script" integrity="sha384-FENNH2f7QuQvkZJBL7jebLr0OtYKgTA2iq+C5g3VXXX7SBwWmeMMoc+pBBtcn76G" crossorigin="anonymous">
		<link rel="preload" href="https://cdn.jsdelivr.net/npm/js-cookie@3.0.5/dist/js.cookie.min.js" as="script">
		
		<link rel="icon" type="image/png" href="/static/images/favicon.png">

		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
		<script 
			src="https://www.unpkg.com/@propelauth/javascript@2.0.11/dist/javascript.min.js" 
			integrity="sha384-FENNH2f7QuQvkZJBL7jebLr0OtYKgTA2iq+C5g3VXXX7SBwWmeMMoc+pBBtcn76G" 
			crossorigin="anonymous"></script>
		<script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.5/dist/js.cookie.min.js"></script>

		<script src="/static/js/auth.js"></script>
		<script src="/static/js/apihelpers.js"></script>
		<script src="/static/js/element.js"></script>
		<script src="/static/js/sidebar.js"></script>
		<script src="/static/js/view-listings.js" defer></script>

		<link rel="stylesheet" href="/static/css/theme.css">
		<link rel="stylesheet" href="/static/css/view-listings.css">
	</head>
	<body class="bg-light text-dark">
		<div class="sidebar bg-primary text-white py-4">
			<button class="sidebar-toggle btn btn-primary" onclick="toggleSidebar()" aria-label="Toggle sidebar">
				&#9776;
			</button>
			
			<nav class="d-flex flex-column align-items-center">
				<a href="/view-listings" class="text-white mb-3">View Listings</a>
				<a href="/view-books" class="text-white mb-3">View Books</a>
				<a href="/enter-isbn" class="text-white mb-3">Add Listing</a>
				<a href="/requests-dash" class="text-white mb-3">Manage Requests</a>
				<a href="/dash" class="text-white mb-3">Profile</a>
				<a href="/help" class="text-white mb-3">Help</a>
				<a href="/leaderboard" class="text-white mb-3">Leaderboard</a>
				<a href="/about" class="text-white mb-3">About</a>
				<a href="https://forms.gle/BGWu2xEUFAbYyPHHA" class="text-white mb-3">Feedback</a>
				<a href="/logout" class="text-white">Logout</a>
			</nav>
		</div>

		<div class="content py-5">
			<div id="wrapper" class="bg-white shadow-sm rounded p-4 mx-4">
				<h1 id="header" class="text-center text-dark mb-4">Book Listings</h1>

				<a id="new-listing" href="/enter-isbn" class="btn body-btn-primary btn-primary mb-4 d-block text-center">List a New Book</a>

				<button id="toggle-filters" class="btn body-btn-primary btn-primary mb-4">Show Filters/Search</button>
				<button id="clear-filters" class="btn body-btn-primary btn-primary mb-4 mx-3" style="display: none;" onclick="clearFilters()">Clear Filters</button>

				<div class="filters mb-4" style="display: none;">
					<div class="form-check form-switch mb-3">
						<input class="form-check-input" type="checkbox" id="show-my-listings">
						<label class="form-check-label" for="show-my-listings">Show only my listings</label>
					</div>

					<fieldset id="filter-set">
						<div class="row g-3 mb-4">
							<div class="col-md-6">
								<input type="text" class="form-control" id="filter-name" placeholder="Search by title">
							</div>
							<div class="col-md-6 d-flex">
								<input type="text" class="form-control me-2" id="filter-isbn" placeholder="Search by ISBN">
								
								<button class="btn body-btn-primary btn-primary" id="search-btn" onclick="newSearch()">
									<i class="bi bi-search"></i>
								</button>
							</div>
						</div>

						<div class="row g-2 mt-2">
							<div class="col-md-4">
								<select class="form-select" id="filter-status">
									<option value="">All Statuses</option>
									<option value="0">Available</option>
									<option value="1">Requested</option>
									<option value="2">Given Away</option>
								</select>
							</div>

							<div class="col-md-4">
								<select class="form-select" id="filter-usage">
									<option value="">All Usage</option>
									<option value="0">New</option>
									<option value="1">Lightly Used</option>
									<option value="2">Used</option>
								</select>
							</div>

							<div class="col-md-4 d-flex">
								<input type="text" class="form-control me-2" id="location-input" placeholder="Add Location Filter">
								<button class="btn body-btn-primary btn-primary" id="add-location" onclick="addLocation()">+</button>
							</div>
						</div>

						<div class="mt-2" id="location-tags"></div>
					</fieldset>
				</div>

				<div id="listings-container" class="mb-4 row">
				</div>

				<div class="d-flex justify-content-between align-items-center mt-4">
					<button id="prev-page" class="btn body-btn-primary btn-primary" onclick="decPage()" disabled>Previous</button>
					<span id="page-info" class="mx-3">Page 1</span>
					<button id="next-page" class="btn body-btn-primary btn-primary" onclick="incPage()" disabled>Next</button>
				</div>
			</div>
		</div>
	</body>
</html>
